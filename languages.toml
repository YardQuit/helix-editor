[[language]]
name = "c"
auto-format = false
indent = {tab-width = 4, unit = "    "}
file-types = ["c", "h"]

[[language]]
name = "rust"
auto-format = false
indent = {tab-width = 4, unit = "    "}

[[language]]
name = "python"
auto-format = false
formatter = { command = "black", args = ["--quiet", "-"] }
indent = {tab-width = 4, unit = "    "}

[[language]]
name = "bash"
auto-format = false
formatter = { command = 'shfmt', args = ["-i", "4"] }
indent = {tab-width = 4, unit = "    "}
